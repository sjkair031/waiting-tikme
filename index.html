<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경비행기장 정밀 관제 및 대기열 시스템</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background: #1a1c23; padding: 30px; color: #e1e4ea; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #3a3f50; padding-bottom: 15px; }
        h1 { color: #4ba3e3; font-size: 28px; }

        .main-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px; }
        
        /* 섹션 공통 스타일 */
        .panel { background: #242836; padding: 20px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.3); }
        h2 { font-size: 18px; margin-bottom: 15px; color: #fff; border-left: 4px solid #4ba3e3; padding-left: 8px; }

        /* 입력창 영역 */
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; color: #9aa0b0; }
        input, select { padding: 10px; background: #2f354a; border: 1px solid #3e445e; color: #fff; border-radius: 6px; font-size: 15px; outline: none; }
        input:focus, select:focus { border-color: #4ba3e3; }
        .btn-primary { background: #4ba3e3; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 5px; }
        .btn-primary:hover { background: #358ccb; }

        /* 비행기 상태 대시보드 */
        .planes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .plane-card { background: #2f354a; padding: 15px; border-radius: 8px; border: 1px solid #3e445e; position: relative; }
        .plane-card.busy { border-color: #e74c3c; background: #3a2a2d; }
        .plane-id { font-weight: bold; font-size: 16px; color: #fff; }
        .plane-status { font-size: 12px; margin-top: 4px; color: #2ecc71; }
        .plane-card.busy .plane-status { color: #e74c3c; }
        .plane-timer { font-size: 20px; font-weight: bold; margin-top: 8px; font-family: monospace; }

        /* 대기열 및 결과 */
        .summary-box { background: #1a1c23; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #3a3f50; }
        .summary-title { font-size: 13px; color: #9aa0b0; }
        .summary-value { font-size: 32px; font-weight: bold; color: #f1c40f; margin-top: 5px; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #3a3f50; }
        th { background: #2f354a; color: #9aa0b0; font-weight: normal; }
        tr:hover { background: #2a2f42; }

        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-takeoff { background: #2ecc71; color: white; }
        .btn-takeoff:hover { background: #27ae60; }
        .btn-cancel { background: #e74c3c; color: white; margin-left: 5px; }
        .btn-cancel:hover { background: #c0392b; }
        
        .empty-text { color: #696f80; padding: 30px !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛩️ 경비행기장 정밀 시뮬레이션 관제 시스템</h1>
    </header>

    <div class="main-layout">
        <div style="display: flex; flex-direction: column; gap: 25px;">
            <div class="panel">
                <h2>1. 비행기 운항 현황 설정</h2>
                <div class="input-group">
                    <label for="planeCount">가동 가능한 총 비행기 수 (대)</label>
                    <input type="number" id="planeCount" min="1" max="10" value="2" onchange="initPlanes()">
                </div>
                
                <div class="planes-grid" id="planesGrid">
                    </div>
            </div>

            <div class="panel">
                <h2>2. 신규 대기 승객 접수</h2>
                <div class="input-group">
                    <label for="passengerName">승객명 / 팀명</label>
                    <input type="text" id="passengerName" placeholder="예: 홍길동 팀">
                </div>
                <div class="input-group">
                    <label for="courseTime">비행 코스 선택</label>
                    <select id="courseTime">
                        <option value="10">A 코스 (10분)</option>
                        <option value="20">B 코스 (20분)</option>
                        <option value="30">C 코스 (30분)</option>
                        <option value="60">D 코스 (1시간)</option>
                    </select>
                </div>
                <button class="btn-primary" style="width: 100%;" onclick="addPassenger()">대기열 등록</button>
            </div>
        </div>

        <div class="panel">
            <h2>3. 실시간 대기 및 탑승 통제 현황</h2>
            
            <div class="summary-box">
                <div class="summary-title">지금 접수 시 예상 대기시간 (정밀 예측)</div>
                <div class="summary-value" id="nextWaitTimeDisplay">즉시 탑승 가능</div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>대기번호</th>
                        <th>승객/팀명</th>
                        <th>신청 코스</th>
                        <th>예상 대기시간</th>
                        <th>탑승 지시</th>
                    </tr>
                </thead>
                <tbody id="queueTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let planes = []; // 비행기 상태 배열 ({id, remainingSeconds, isBusy})
    let queue = [];  // 대기 승객 배열 ({id, name, courseMinutes})
    let idCounter = 0;

    // 1초마다 전체 비행기 타이머 깎고 대기시간 다시 계산하기
    setInterval(() => {
        planes.forEach(plane => {
            if (plane.isBusy && plane.remainingSeconds > 0) {
                plane.remainingSeconds--;
                if (plane.remainingSeconds <= 0) {
                    plane.isBusy = false;
                }
            }
        });
        renderPlanes();
        calculateSimulation();
    }, 1000);

    // 비행기 초기화 생성
    function initPlanes() {
        const count = parseInt(document.getElementById('planeCount').value) || 1;
        
        // 기존 비행기 수 유지하면서 개수 맞추기
        if (planes.length < count) {
            for (let i = planes.length + 1; i <= count; i++) {
                planes.push({ id: i, remainingSeconds: 0, isBusy: false });
            }
        } else if (planes.length > count) {
            planes = planes.slice(0, count);
        }
        renderPlanes();
        calculateSimulation();
    }

    // 비행기 현황판 그리기
    function renderPlanes() {
        const grid = document.getElementById('planesGrid');
        grid.innerHTML = '';

        planes.forEach(p => {
            const card = document.createElement('div');
            card.className = `plane-card ${p.isBusy ? 'busy' : ''}`;
            
            const min = Math.floor(p.remainingSeconds / 60);
            const sec = p.remainingSeconds % 60;
            const timeStr = p.isBusy ? `${min}분 ${sec}초 남음` : '대기 중 (Standby)';

            card.innerHTML = `
                <div class="plane-id">🛩️ 비행기 ${p.id}호</div>
                <div class="plane-status">${p.isBusy ? '❌ 비행 중' : '🟢 대기 중'}</div>
                <div class="plane-timer">${timeStr}</div>
            `;
            grid.appendChild(card);
        });
    }

    // 대기 승객 추가
    function addPassenger() {
        const nameInput = document.getElementById('passengerName');
        const courseSelect = document.getElementById('courseTime');

        if (!nameInput.value.trim()) {
            alert('승객명을 입력하세요.');
            return;
        }

        idCounter++;
        queue.push({
            id: idCounter,
            name: nameInput.value,
            courseMinutes: parseInt(courseSelect.value)
        });

        nameInput.value = '';
        calculateSimulation();
    }

    // 비행기 이륙 (대기열에서 빠지면서 특정 비행기 타이머 시작)
    function takeoff(passengerId) {
        // 가장 먼저 비어 있는(또는 가장 먼저 내릴) 비행기 찾기
        let targetPlane = planes.find(p => !p.isBusy);
        
        if (!targetPlane) {
            alert("현재 비행 중인 기체들이 있어 이륙 처리가 불가능합니다. 비행기가 착륙(대기 중으로 전환)하면 이륙 버튼을 눌러주세요.");
            return;
        }

        const passengerIndex = queue.findIndex(p => p.id === passengerId);
        if (passengerIndex !== -1) {
            const passenger = queue[passengerIndex];
            
            // 비행기에 시간 주입 (초 단위 변환)
            targetPlane.isBusy = true;
            targetPlane.remainingSeconds = passenger.courseMinutes * 60;
            
            // 대기열에서 삭제
            queue.splice(passengerIndex, 1);
            
            renderPlanes();
            calculateSimulation();
        }
    }

    // 대기 취소
    function cancelQueue(id) {
        queue = queue.filter(p => p.id !== id);
        calculateSimulation();
    }

    // ⭐ 핵심: 타임라인 시뮬레이션 대기시간 계산 함수
    function calculateSimulation() {
        const nextWaitTimeDisplay = document.getElementById('nextWaitTimeDisplay');
        const tbody = document.getElementById('queueTableBody');
        tbody.innerHTML = '';

        if (planes.length === 0) {
            nextWaitTimeDisplay.innerText = "비행기 없음";
            return;
        }

        // 시뮬레이션용 임시 비행기 타임라인 복사 (초 단위)
        let virtualPlanes = planes.map(p => p.remainingSeconds);

        // 현재 대기열에 있는 사람들을 가상으로 타임라인에 하나씩 배치해보기
        let passengerWaitTimes = []; // 각 대기자별 가상 대기시간(분)

        queue.forEach(passenger => {
            // 가장 먼저 비는 비행기의 인덱스 찾기 (남은 시간이 제일 적은 녀석)
            let minRemainingIndex = 0;
            for (let i = 1; i < virtualPlanes.length; i++) {
                if (virtualPlanes[i] < virtualPlanes[minRemainingIndex]) {
                    minRemainingIndex = i;
                }
            }

            // 이 승객이 기다려야 하는 시간은 해당 비행기가 빌 때까지의 시간
            let waitSeconds = virtualPlanes[minRemainingIndex];
            passengerWaitTimes.push(Math.ceil(waitSeconds / 60));

            // 가상 비행기에 이 승객의 비행 코스 시간만큼 누적 추가
            virtualPlanes[minRemainingIndex] += (passenger.courseMinutes * 60);
        });

        // 1. 테이블 렌더링
        if (queue.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="empty-text">현재 대기실에 대기 중인 승객이 없습니다.</td></tr>`;
        } else {
            queue.forEach((passenger, index) => {
                const row = document.createElement('tr');
                const waitTime = passengerWaitTimes[index];
                const waitText = waitTime === 0 ? "즉시 탑승" : `약 ${waitTime}분`;
                
                // 첫 번째 대기자이고, 비어 있는 비행기가 있을 때만 [이륙 지시] 활성화 느낌 주기
                const hasReadyPlane = planes.some(p => !p.isBusy);
                const isFirst = (index === 0);
                const buttonDisableAttr = (isFirst && hasReadyPlane) ? '' : 'style="background:#7f8c8d; cursor:not-allowed;"';

                row.innerHTML = `
                    <td><b>${index + 1}번</b></td>
                    <td>${passenger.name}</td>
                    <td><span style="color:#4ba3e3; font-weight:bold;">${passenger.courseMinutes}분 코스</span></td>
                    <td style="color:#f1c40f; font-weight:bold;">${waitText}</td>
                    <td>
                        <button class="btn-action btn-takeoff" ${buttonDisableAttr} onclick="takeoff(${passenger.id})">🛫 이륙 지시</button>
                        <button class="btn-action btn-cancel" onclick="cancelQueue(${passenger.id})">취소</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // 2. 상단 전광판 업데이트 (지금 접수할 다음 사람의 예상 대기시간)
        let nextMinIndex = 0;
        for (let i = 1; i < virtualPlanes.length; i++) {
            if (virtualPlanes[i] < virtualPlanes[nextMinIndex]) {
                nextMinIndex = i;
            }
        }
        let nextWaitMinutes = Math.ceil(virtualPlanes[nextMinIndex] / 60);
        
        if (nextWaitMinutes <= 0) {
            nextWaitTimeDisplay.innerText = "즉시 탑승 가능";
            nextWaitTimeDisplay.style.color = "#2ecc71";
        } else {
            nextWaitTimeDisplay.style.color = "#f1c40f";
            if (nextWaitMinutes >= 60) {
                const h = Math.floor(nextWaitMinutes / 60);
                const m = nextWaitMinutes % 60;
                nextWaitTimeDisplay.innerText = m === 0 ? `약 ${h}시간` : `약 ${h}시간 ${m}분`;
            } else {
                nextWaitTimeDisplay.innerText = `약 ${nextWaitMinutes}분`;
            }
        }
    }

    // 최초 실행
    initPlanes();
</script>
</body>
</html>
